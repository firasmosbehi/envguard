version: "2"

run:
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
  exclusions:
    generated: lax
    paths:
      - packages/node/node_modules
      - vendor
      - third_party$
      - builtin$
      - examples/
    rules:
      - path: _test\.go
        linters:
          - govet
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/envguard/envguard
  exclusions:
    generated: lax
    paths:
      - packages/node/node_modules
      - vendor
      - third_party$
      - builtin$
      - examples/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
