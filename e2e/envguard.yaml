version: "1.0"

env:
  DATABASE_URL:
    type: string
    required: true
    description: "Database connection string"

  PORT:
    type: integer
    default: 3000
    description: "Server port"

  DEBUG:
    type: boolean
    default: false
    description: "Enable debug mode"

  LOG_LEVEL:
    type: string
    enum: [debug, info, warn, error]
    default: info
    description: "Logging verbosity"
