version: "1.0"
env:
  DATABASE_URL:
    type: string
    required: true
    description: "Database connection string"
    format: url

  PORT:
    type: integer
    default: 3000
    description: "Server port"
    min: 1
    max: 65535

  DEBUG:
    type: boolean
    default: false
    description: "Enable debug mode"
