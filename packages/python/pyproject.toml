[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "envguard-validator"
version = "0.1.6"
description = "Python wrapper for EnvGuard — validate .env files against a YAML schema"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "EnvGuard Contributors"}
]
keywords = ["env", "dotenv", "validation", "schema", "environment", "variables"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
requires-python = ">=3.8"

[project.urls]
Homepage = "https://github.com/firasmosbehi/envguard"
Repository = "https://github.com/firasmosbehi/envguard"
Issues = "https://github.com/firasmosbehi/envguard/issues"

[project.scripts]
envguard-py = "envguard.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["envguard*"]
