[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "envguard-validator"
version = "1.0.0"
description = "Python wrapper for EnvGuard — validate .env files against a YAML schema"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "EnvGuard Contributors"}
]
keywords = ["env", "dotenv", "validation", "schema", "environment", "variables"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
requires-python = ">=3.8"

[project.urls]
Homepage = "https://github.com/firasmosbehi/envguard"
Repository = "https://github.com/firasmosbehi/envguard"
Issues = "https://github.com/firasmosbehi/envguard/issues"

[project.scripts]
envguard-py = "envguard.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["envguard*"]

[tool.ruff]
target-version = "py38"
line-length = 100
src = ["envguard", "tests"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # Pyflakes
  "I",   # isort
  "N",   # pep8-naming
  "D",   # pydocstyle
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
  "ARG", # flake8-unused-arguments
]
ignore = [
  "D100",  # Missing docstring in public module
  "D104",  # Missing docstring in public package
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D102"]  # Missing docstring in public method (tests are self-describing)

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
