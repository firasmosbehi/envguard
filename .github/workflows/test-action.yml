name: Test GitHub Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-action:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test valid .env
        uses: ./
        with:
          schema: examples/envguard.yaml
          env: examples/.env

      - name: Test invalid .env (expect failure)
        id: invalid
        uses: ./
        continue-on-error: true
        with:
          schema: examples/envguard.yaml
          env: examples/.env.invalid

      - name: Assert invalid failed
        run: |
          if [ "${{ steps.invalid.outcome }}" != "failure" ]; then
            echo "Expected validation to fail for invalid .env"
            exit 1
          fi
          echo "✓ Action correctly fails on invalid .env"
