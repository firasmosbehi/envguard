name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: make build

      - name: Test
        run: go test -v -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          skip-cache: true

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: cd packages/node && npm ci

      - name: Lint Node
        run: cd packages/node && npm run lint

      - name: Test Node
        run: cd packages/node && npm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Lint Python
        run: cd packages/python && ruff check envguard/ tests/

      - name: Format check Python
        run: cd packages/python && ruff format --check envguard/ tests/

      - name: Test Python
        run: cd packages/python && python3 -m unittest discover

  e2e:
    runs-on: ubuntu-latest
    needs: [test-go]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: make build

      - name: E2E — valid env
        run: ./bin/envguard validate -s examples/envguard.yaml -e examples/.env

      - name: E2E — invalid env (expect failure)
        run: |
          if ./bin/envguard validate -s examples/envguard.yaml -e examples/.env.invalid; then
            echo "Expected failure but got success"
            exit 1
          fi

      - name: E2E — JSON output
        run: ./bin/envguard validate -s examples/envguard.yaml -e examples/.env -f json | jq -e '.valid == true'

      - name: E2E — strict mode
        run: |
          cp examples/.env /tmp/.env.strict
          echo 'UNKNOWN=val' >> /tmp/.env.strict
          ./bin/envguard validate -s examples/envguard.yaml -e /tmp/.env.strict --strict
